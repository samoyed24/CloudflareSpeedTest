name: Build Push and Deploy via Tailscale

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - master

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Alibaba Cloud ACR
        uses: docker/login-action@v3
        with:
          registry: ${{ secrets.ACR_REGISTRY }}
          username: ${{ secrets.ACR_USERNAME }}
          password: ${{ secrets.ACR_PASSWORD }}

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ secrets.ACR_REGISTRY }}/${{ secrets.ACR_NAMESPACE }}/${{ secrets.IMAGE_NAME }}
          tags: |
            type=sha,prefix=sha-
            type=raw,value=latest

      - name: Build and push (linux/amd64, linux/arm64)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

      - name: Connect to Tailscale
        uses: tailscale/github-action@v3
        with:
          oauth-client-id: ${{ secrets.TS_OAUTH_CLIENT_ID }}
          oauth-secret: ${{ secrets.TS_OAUTH_SECRET }}
          tags: tag:ci

      - name: Deploy on private server over Tailscale SSH
        env:
          TS_SSH_USER: ${{ secrets.TS_SSH_USER }}
          TS_TARGET_HOST: ${{ secrets.TS_TARGET_HOST }}
          DEPLOY_WORKDIR: ${{ secrets.DEPLOY_WORKDIR }}
          DEPLOY_COMPOSE_FILE: ${{ secrets.DEPLOY_COMPOSE_FILE }}
          ACR_REGISTRY: ${{ secrets.ACR_REGISTRY }}
          ACR_NAMESPACE: ${{ secrets.ACR_NAMESPACE }}
          IMAGE_NAME: ${{ secrets.IMAGE_NAME }}
          ACR_USERNAME: ${{ secrets.ACR_USERNAME }}
          ACR_PASSWORD: ${{ secrets.ACR_PASSWORD }}
          CFST_INTERVAL_SECONDS: ${{ secrets.CFST_INTERVAL_SECONDS }}
          CFST_ARGS: ${{ secrets.CFST_ARGS }}
          CFST_RESULT_ENVIRONMENT: ${{ secrets.CFST_RESULT_ENVIRONMENT }}
          CFST_HISTORY_HOURS: ${{ secrets.CFST_HISTORY_HOURS }}
          CFST_VMESS_TEMPLATE_B64: ${{ secrets.CFST_VMESS_TEMPLATE_B64 }}
          NGINX_HTTP_PORT: ${{ secrets.NGINX_HTTP_PORT }}
          NGINX_HTTPS_PORT: ${{ secrets.NGINX_HTTPS_PORT }}
          NGINX_SERVER_NAME: ${{ secrets.NGINX_SERVER_NAME }}
          NGINX_SSL_CERT_PATH: ${{ secrets.NGINX_SSL_CERT_PATH }}
          NGINX_SSL_KEY_PATH: ${{ secrets.NGINX_SSL_KEY_PATH }}
          NGINX_SSL_CERT_PEM: ${{ secrets.NGINX_SSL_CERT_PEM }}
          NGINX_SSL_KEY_PEM: ${{ secrets.NGINX_SSL_KEY_PEM }}
        run: |
          set -eu
          SSH_USER="${TS_SSH_USER:-root}"
          TARGET_HOST="${TS_TARGET_HOST}"
          WORKDIR="${DEPLOY_WORKDIR:-/opt/cfst}"
          COMPOSE_FILE="${DEPLOY_COMPOSE_FILE:-docker-compose.yml}"
          COMPOSE_LOCAL="/tmp/${COMPOSE_FILE}"
          TARGET_HOST_TRIMMED="$(printf '%s' "${TARGET_HOST}" | tr -d '[:space:]')"

          if [ -z "${TARGET_HOST_TRIMMED}" ]; then
            echo "TS_TARGET_HOST is required" >&2
            exit 1
          fi

          yaml_sq() {
            printf '%s' "$1" | sed "s/'/''/g"
          }

          interval_value="${CFST_INTERVAL_SECONDS:-300}"
          args_value="${CFST_ARGS:--f ip.txt}"
          compose_image="${ACR_REGISTRY}/${ACR_NAMESPACE}/${IMAGE_NAME}:latest"
          cert_pem_b64=""
          key_pem_b64=""

          if [ -n "${NGINX_SSL_CERT_PEM:-}" ]; then
            cert_pem_b64="$(printf '%s' "${NGINX_SSL_CERT_PEM}" | base64 -w0)"
          fi
          if [ -n "${NGINX_SSL_KEY_PEM:-}" ]; then
            key_pem_b64="$(printf '%s' "${NGINX_SSL_KEY_PEM}" | base64 -w0)"
          fi

          interval_escaped="$(yaml_sq "${interval_value}")"
          args_escaped="$(yaml_sq "${args_value}")"

          {
            echo "services:"
            echo "  cfst:"
            echo "    image: '${compose_image}'"
            echo "    container_name: cfst"
            echo "    restart: unless-stopped"
            echo "    environment:"
            echo "      CFST_INTERVAL_SECONDS: '${interval_escaped}'"
            echo "      CFST_ARGS: '${args_escaped}'"
            if [ -n "${CFST_RESULT_ENVIRONMENT:-}" ]; then
              echo "      CFST_RESULT_ENVIRONMENT: '$(yaml_sq "${CFST_RESULT_ENVIRONMENT}")'"
            fi
            if [ -n "${CFST_HISTORY_HOURS:-}" ]; then
              echo "      CFST_HISTORY_HOURS: '$(yaml_sq "${CFST_HISTORY_HOURS}")'"
            fi
            if [ -n "${CFST_VMESS_TEMPLATE_B64:-}" ]; then
              echo "      CFST_VMESS_TEMPLATE_B64: '$(yaml_sq "${CFST_VMESS_TEMPLATE_B64}")'"
            fi
            if [ -n "${NGINX_HTTP_PORT:-}" ]; then
              echo "      NGINX_HTTP_PORT: '$(yaml_sq "${NGINX_HTTP_PORT}")'"
            fi
            if [ -n "${NGINX_HTTPS_PORT:-}" ]; then
              echo "      NGINX_HTTPS_PORT: '$(yaml_sq "${NGINX_HTTPS_PORT}")'"
            fi
            if [ -n "${NGINX_SERVER_NAME:-}" ]; then
              echo "      NGINX_SERVER_NAME: '$(yaml_sq "${NGINX_SERVER_NAME}")'"
            fi
            if [ -n "${NGINX_SSL_CERT_PATH:-}" ]; then
              echo "      NGINX_SSL_CERT_PATH: '$(yaml_sq "${NGINX_SSL_CERT_PATH}")'"
            fi
            if [ -n "${NGINX_SSL_KEY_PATH:-}" ]; then
              echo "      NGINX_SSL_KEY_PATH: '$(yaml_sq "${NGINX_SSL_KEY_PATH}")'"
            fi
            if [ -n "${cert_pem_b64}" ]; then
              echo "      NGINX_SSL_CERT_PEM_B64: '$(yaml_sq "${cert_pem_b64}")'"
            fi
            if [ -n "${key_pem_b64}" ]; then
              echo "      NGINX_SSL_KEY_PEM_B64: '$(yaml_sq "${key_pem_b64}")'"
            fi
            echo "    ports:"
            echo "      - '8080:8080'"
            echo "      - '8443:8443'"
            echo "    volumes:"
            echo "      - ./data:/app"
            echo "      - ./certs:/app/certs:ro"
          } > "${COMPOSE_LOCAL}"

          COMPOSE_B64="$(base64 -w0 "${COMPOSE_LOCAL}")"

          echo "[deploy] checking Tailscale SSH reachability to ${TARGET_HOST_TRIMMED}"

          mkdir -p ~/.ssh
          {
            echo "Host *.ts.net"
            echo "  StrictHostKeyChecking accept-new"
          } >> ~/.ssh/config

          tailscale ssh "${SSH_USER}@${TARGET_HOST_TRIMMED}" "\
            set -eu; \
            mkdir -p '${WORKDIR}'; \
            cd '${WORKDIR}'; \
            echo '${COMPOSE_B64}' | base64 -d > '${COMPOSE_FILE}'; \
            printf '%s' '${ACR_PASSWORD}' | docker login '${ACR_REGISTRY}' -u '${ACR_USERNAME}' --password-stdin; \
            docker compose -f '${COMPOSE_FILE}' pull; \
            docker compose -f '${COMPOSE_FILE}' up -d; \
            docker image prune -f \
          "
